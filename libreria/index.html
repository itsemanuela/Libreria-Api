<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Online Library</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <style>
    nav {
      background-color: #85939e;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      background-image: url(./tea-books-cozy-pattern_1191-505.avif);
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    }
    h1 {
      color: rgb(165, 58, 96);
    }
    .card {
      background-color: pink !important;
    }
    .btn {
      background-color: rgb(165, 58, 96) !important;
      font-family: italic;
      padding: 10px;
    }

    .card :hover {
      transform: scale(1.1);
      cursor: pointer;
    }
  </style>

  <body>
    <header>
      <!-- place navbar here -->
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand text-light fs-3" href="#">
            <img src="./library.webp" width="60px" alt="" />
            L'angolo del segnalibro
          </a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a
                  class="nav-link active text-light"
                  aria-current="page"
                  href="#"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link text-light" href="#">Genere</a>
              </li>
              <li class="nav-item dropdown">
                <a
                  class="nav-link dropdown-toggle text-light"
                  href="#"
                  role="button"
                  data-bs-toggle="dropdown"
                  aria-expanded="false"
                >
                  Dropdown
                </a>
                <ul class="dropdown-menu t">
                  <li>
                    <a class="dropdown-item" href="#">E-book</a>
                  </li>

                  <li><hr class="dropdown-dividertext-light" /></li>
                  <li>
                    <a class="dropdown-item" href="#">Something else here</a>
                  </li>
                </ul>
              </li>
            </ul>
            <form class="d-flex" role="search">
              <input
                class="form-control me-2"
                type="search"
                placeholder="Search"
                aria-label="Search"
              />
              <button class="btn btn-outline-light" type="submit">
                Search
              </button>
            </form>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <h1 class="text-center mt-5 fw-2">Scegli il tuo prossimo libro!</h1>
      <div class="container mt-5">
        <div id="contenitore-card" class="row"></div>
      </div>
      <div
        class="toast-container position-fixed bottom-0 end-0 p-3"
        style="z-index: 11"
      >
        <div
          id="liveToast"
          class="toast hide"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="toast-header bg-success text-white">
            <strong class="me-auto">L'angolo del segnalibro</strong>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="toast-body" id="toast-message">
            Libro aggiunto al carrello!
          </div>
        </div>
      </div>
    </main>
    <footer>
      <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Bundle (includes Popper) -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./file.js"></script>
  </body>
</html>
